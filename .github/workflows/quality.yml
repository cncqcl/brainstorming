name: Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: python -m pip install -e ".[dev,test]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format
        run: ruff format . --check

      - name: Mypy
        run: mypy src/

      - name: Pytest
        run: pytest --cov=src --cov-fail-under=80 --tb=short
